name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/psicoatrading-repo
            git pull origin main
            cp index.html /home/psicoatrading.online/public_html/index.html
            cp app/index.html /home/psicoatrading.online/public_html/app/index.html
            cp app/index.html /home/psicoatrading.online/app/index.html
            cp app/logo.png /home/psicoatrading.online/public_html/app/logo.png
            cp app/logo.png /home/psicoatrading.online/app/logo.png
            cp app/setup-password.html /home/psicoatrading.online/public_html/app/setup-password.html
            cp app/setup-password.html /home/psicoatrading.online/app/setup-password.html
            cp api/main.py /var/www/api/main.py
            cp api/schema.sql /var/www/api/schema.sql
            cp api/requirements.txt /var/www/api/requirements.txt
            cd /var/www/api && source venv/bin/activate && pip install -r requirements.txt --quiet
            python3 -c "import ast; ast.parse(open('main.py', encoding='utf-8').read())" && echo "Sintaxis OK" || (echo "ERROR: sintaxis invalida, abortando"; exit 1)
            systemctl reset-failed psicoatrading-api 2>/dev/null || true
            systemctl restart psicoatrading-api
            sleep 4
            systemctl is-active psicoatrading-api && echo "Servicio activo" || (echo "ERROR: servicio no arranco"; journalctl -u psicoatrading-api --no-pager -n 30; exit 1)
            echo "Deploy completado: $(date)"
